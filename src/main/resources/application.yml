spring:
  application:
    name: trending-api

  profiles:
    active: dev

  datasource:
    url: jdbc:h2:mem:trendingdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

# Reddit API Configuration
reddit:
  api:
    base-url: https://oauth.reddit.com
    auth-url: https://www.reddit.com/api/v1/access_token
    client-id: ${REDDIT_CLIENT_ID:your-client-id}
    client-secret: ${REDDIT_CLIENT_SECRET:your-client-secret}
    user-agent: TrendingAPI/1.0
    timeout: 10000
  subreddits:
    memes:
      - memes
      - dankmemes
    news:
      - worldnews
      - news

# News API Configuration
newsapi:
  api:
    base-url: https://newsapi.org/v2
    api-key: ${NEWSAPI_KEY:your-api-key}
    timeout: 10000
  categories:
    - general
    - technology
    - business
    - entertainment

# Scheduling Configuration
scheduling:
  enabled: true
  memes:
    fetch-limit: 100
    retention-days: 7
  news:
    fetch-limit: 50
    retention-days: 30

# Logging
logging:
  level:
    com.trending.api: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Server Configuration
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
